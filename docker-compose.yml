services:
  postgres:
    image: postgres:16-alpine
    container_name: better-auth-migration-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
